name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (exact calibrated grammar pins)
        run: pip install -e ".[dev]" -c constraints/ci.txt
      - name: Lint
        run: ruff check src tests tools
      - name: Test (consistency corpus, spec gates, BW fidelity, determinism)
        run: pytest

  typecheck:
    runs-on: ubuntu-latest # hard gate since W4-5: mypy --strict is green
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" -c constraints/ci.txt
      - run: mypy

  spec-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e . -c constraints/ci.txt
      - name: Generated spec docs must not be stale
        run: |
          python tools/gen_spec_docs.py
          git add -N docs/ # so a newly generated (untracked) file also fails the diff
          git diff --exit-code docs/ || {
            echo "::error::docs/spec is stale; run tools/gen_spec_docs.py and commit"; exit 1; }

  differential:
    # External-oracle differential lane (ARCHITECTURE.md §3.4/§8.2): with the
    # oracles present, every observed divergence must be classified in
    # tests/differential/divergences.toml and no entry may be stale.
    #
    # A missing oracle SKIPs, which is the right answer on a contributor's
    # machine and the wrong one here: it would turn every comparison into a
    # no-op and this job would pass while testing nothing. So each oracle is
    # proved live BEFORE pytest runs. Three are pip packages and are
    # hard-imported; PMD is a JVM tool (it is why this job needs a JDK at all)
    # and is proved by running it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Install with differential oracles
        run: pip install -e ".[dev,oracles]" -c constraints/ci.txt
      - name: Read the PMD pin
        id: pmd
        run: |
          python - >> "$GITHUB_OUTPUT" <<'PY'
          import tomllib
          pin = tomllib.load(open("tests/differential/pmd.toml", "rb"))["pmd"]
          print(f"version={pin['version']}")
          print(f"home=.oracles/{pin['unpacks_to']}")
          print(f"sha256={pin['sha256']}")
          PY
      - name: Cache the pinned PMD
        # Keyed on the pinned sha256, so a cache entry can only have been
        # written by a run whose download tools/fetch_pmd.py had verified, and a
        # pin bump can never be served a stale distribution.
        uses: actions/cache@v6
        with:
          path: ${{ steps.pmd.outputs.home }}
          key: pmd-${{ steps.pmd.outputs.sha256 }}
      - name: Fetch the pinned PMD (a no-op on a cache hit)
        run: python tools/fetch_pmd.py
      - name: Oracles must import (SKIP is honest locally, not in this job)
        run: python -c "import radon.complexity, lizard, cognitive_complexity.api"
      - name: PMD must run (same reason; the harness also asserts its version)
        run: ${{ steps.pmd.outputs.home }}/bin/pmd --version
      - name: Differential oracle lane
        run: pytest tests/differential -q

# The weekly grammar early-warning lane lives in grammar-bump.yml (it needs its
# own `schedule:` trigger, which this workflow does not declare).
