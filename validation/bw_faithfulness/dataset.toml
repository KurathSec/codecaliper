# Provenance of the original Buse-Weimer dataset (ARCHITECTURE.md §8.3).
# THE DATA IS NEVER COMMITTED OR REDISTRIBUTED — fetch.py downloads it to
# cache/ (gitignored) and verifies the checksum.
[dataset]
id = "bw2010-original-100java"
description = "100 Java snippets rated 1-5 by 120 annotators (Buse & Weimer, TSE 2010)"
url = "https://dibt-research.unimol.it/report/readability/files/DatasetBW.zip"
# sha256 of the archive as first fetched (TOFU-anchored 2026-07-04); fetch.py
# verifies against this and refuses a mismatching download.
sha256 = "27eb445ba407b2ae5582d63e6072ad00072bfb96365562769b0724fa14485ece"
# Layout confirmed against that archive: snippets/1.jsnp .. snippets/100.jsnp
# (Java fragments) + oracle.csv (one row per annotator: id, cohort, then 100
# scores 1-5 in snippet order 1..100). NOTE: the archive holds 121 annotator
# rows, not the paper's "120 annotators" — reported as-is, not reconciled.

[license]
status = "REDISTRIBUTION_GRANTED_BY_AUTHOR"
note = """
No explicit data license is published for DatasetBW.zip on the Scalabrino
replication page (dibt-research.unimol.it/report/readability, verified
2026-07-03). The original author Westley Weimer granted, by email on
2026-07-12, permission to (1) redistribute the raw snippets and annotator
scores as part of an archived research artifact and (2) publish data derived
from the snippets. Requested citation, to be included wherever the data is
used: Buse & Weimer, "Learning a Metric for Code Readability", IEEE TSE
36(4):546-558, 2010; and Buse & Weimer, "A Metric for Software Readability",
ISSTA 2008:121-130. The grant is preserved in paper/license-inquiry-email.txt
(local). The pipeline still fetches at run time and commits only derived
vectors by default (repo focus, not license); bundling the raw data is now
permitted if desired.
"""
