unit = "L.make"
metric = "cyclomatic"
ours = 2
theirs = 1
ruling = "CORE-ALL-0003"
reason = "CORE-ALL-0003 keeps a lambda body inside the enclosing unit, so the lambda's `if` counts toward make. PMD's CyclomaticComplexity rule neither descends into the lambda nor reports it as a unit of its own, so that `if` is counted nowhere and the method reads as 1. Two witnesses put PMD alone here: lizard scores make 2, and PMD's OWN CognitiveComplexity rule does descend into the lambda (cognitive 2, agreeing with us), so PMD's two rules disagree with each other about lambda bodies."
