[[divergence]]
oracle = "lizard"
case = "snippet:diff-comp-guard"
unit = "evens"
metric = "cyclomatic"
ours = 2
theirs = 3
ruling = "CC-PY-0004"
reason = "lizard's token-based CCN counts the comprehension `for` keyword as a loop; CC-PY-0004 rules the iteration clause is not a decision point (only the guard counts)."

[[divergence]]
oracle = "lizard"
case = "snippet:diff-match-in-func"
unit = "dispatch"
metric = "cyclomatic"
ours = 3
theirs = 4
ruling = "CC-PY-0008"
reason = "lizard counts every `case` token including the bare wildcard arm; CC-PY-0008 rules `case _:` with no guard is the fall-through path and does not count (mirror of Java `default:`)."

[[divergence]]
