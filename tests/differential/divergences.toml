unit = "evens"
metric = "cyclomatic"
ours = 2
theirs = 3
ruling = "CC-PY-0004"
reason = "radon counts each comprehension generator as a decision point in addition to its guards; CC-PY-0004 counts only guard `if_clause`s, never the iteration clause."

[[divergence]]
