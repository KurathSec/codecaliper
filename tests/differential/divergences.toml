# Classified known divergences from external oracles (ARCHITECTURE.md §3.4).
#
# The differential lane keeps this table complete BY CONSTRUCTION, in both
# directions: an observed divergence with no entry fails CI (the test prints a
# ready-to-paste stanza), and an entry that is no longer observed fails as
# stale. `unit` is the codecaliper qualified function name; `ours` is the
# value pinned by `ruling`; `theirs` is the installed oracle's value.
# Cognitive comparisons run codecaliper in sonar-compat mode.
#
# Rendered to docs/spec/divergences.md by tools/gen_divergences.py.
# Append-order file: new stanzas from the ready-to-paste test output land at the
# end. The RENDERED doc (tools/gen_divergences.py) sorts by (oracle, case, unit,
# metric); this file is not required to.

