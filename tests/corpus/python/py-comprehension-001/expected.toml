[case]
id = "py-comprehension-001"
language = "python"
rulings = ["CC-PY-0004", "COG-PY-0001", "BW-ALL-0006"]
computed_by = "hand"
notes = """
CC = 1 + comprehension guard (if_clause, CC-PY-0004) = 2; the for_in_clause is
iteration syntax, not a decision. Cognitive = 0 (comprehension guards are not
cognitive increments; no boolean operators).
lloc = 2 expression_statements.
BW: assignments `=`*2 -> avg 1.0; arithmetic `*` and `%` -> 1.0; comparison
`==` -> 0.5; numbers 1,2,3,4 / 2,2,0 -> avg 3.5, max 4; commas 3 on line 1 ->
1.5; keywords for/in/if on line 2 -> max 3.
"""

[expect.file]
cyclomatic = 2
physical_lines = 2
sloc = 2
comment_lines = 0
lloc = 2

[expect.file.cognitive]
whitepaper = 0
sonar_compat = 0

[expect.bw]
avg_assignments = 1.0
avg_arithmetic_ops = 1.0
avg_comparison_ops = 0.5
avg_numbers = 3.5
max_numbers = 4.0
avg_commas = 1.5
max_keywords = 3.0
