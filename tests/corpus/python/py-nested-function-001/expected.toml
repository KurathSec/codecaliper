[case]
id = "py-nested-function-001"
language = "python"
rulings = ["CORE-ALL-0003", "CC-PY-0005", "COG-ALL-0001", "COG-ALL-0004"]
computed_by = "hand"
notes = """
Nested-unit attribution (CORE-ALL-0003):
File CC = 1 + inner if + for + outer if = 4 (one whole-file walk).
File cognitive = inner def is NESTED (inside outer) so its body nests one level
(COG-ALL-0004): inner if +2; outer for +1 (nesting 0); if inner(it) +2 (inside
for) = 5.
Per-function values EXCLUDE nested defs:
  outer: CC = 1 + for + if = 3; cognitive = for +1, if +2 = 3.
  inner: CC = 1 + if = 2;      cognitive = if +1 = 1.
lloc = 2 defs + 2 ifs + 1 for + 3 returns + 2 expression_statements = 10.
"""

[expect.file]
cyclomatic = 4
physical_lines = 10
sloc = 10
lloc = 10

[expect.file.cognitive]
whitepaper = 5
sonar_compat = 5

[expect.functions.outer]
cyclomatic = 3
cognitive = 3

[expect.functions.inner]
cyclomatic = 2
cognitive = 1
