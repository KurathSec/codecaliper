[case]
id = "py-ellipsis-001"
language = "python"
rulings = ["TOK-PY-0003", "HAL-ALL-0001", "LOC-ALL-0004", "TOK-ALL-0005"]
computed_by = "hand"
# lizard sees zero function units in single-line `...`-body stubs (verified),
# so a differential unit-set match is impossible; the mismatch is lizard's
# parser limit, not a value divergence. radon and cognitive_complexity DO
# recognize the stubs and actually agree with our values; but the
# reference_comparable flag gates every lane at once, so they are excluded too.
# This case's `...` Halstead contribution is gated by its own hand-computed
# expectations below.
reference_comparable = false
notes = """
TOK-PY-0003 (new in spec 1.1.0): the `...` literal (named `ellipsis` leaf)
lexes as an OPERATOR token, so it counts toward Halstead operators. Before
1.1.0 it fell through to OTHER and was invisible to Halstead. This is a `.pyi`-
shaped stub file (two `def ...: ...` stubs).
4 physical lines, lines 2-3 blank -> blank 2; code on lines 1,4 -> sloc 2;
no comments -> cloc 0. lloc = 2 function_definition + 2 expression_statement
(each `...` body) = 4 (LOC-ALL-0004).
CC = 1 (no decisions); cognitive = 0 both modes.
Halstead operators (KEYWORD/OPERATOR/PUNCT tokens) per stub line: def ( : )
-> : ... = 7 -> N1 = 14; distinct {def, (, :, ), ->, ...} -> n1 = 6 (the two
`...` are the ruled contribution: without TOK-PY-0003, N1 = 12, n1 = 5).
Operands (identifiers): stub a int int / other b str str -> N2 = 8, distinct
{stub, a, int, other, b, str} -> n2 = 6. n = 12, N = 22; volume =
22 * log2(12) = 78.8691750159.
BW over 4 lines: identifiers L1 stub,a,int,int = 4; L4 other,b,str,str = 4 ->
avg 8/4 = 2.0, max 4. Keywords L1 def, L4 def -> avg 0.5, max 1. `...` matches
no counted BW operator spelling, so BW is unchanged by the ruling.
"""

[expect.file]
cyclomatic = 1
physical_lines = 4
blank_lines = 2
sloc = 2
comment_lines = 0
lloc = 4

[expect.file."halstead.n1"]
value = 6.0
abs_tol = 0.0

[expect.file."halstead.N1"]
value = 14.0
abs_tol = 0.0

[expect.file."halstead.n2"]
value = 6.0
abs_tol = 0.0

[expect.file."halstead.N2"]
value = 8.0
abs_tol = 0.0

[expect.file."halstead.volume"]
value = 78.8691750159
abs_tol = 1e-4

[expect.file.cognitive]
whitepaper = 0
sonar_compat = 0

[expect.functions.stub]
cyclomatic = 1
cognitive = 0

[expect.bw]
avg_identifiers = 2.0
max_identifiers = 4.0
avg_keywords = 0.5
max_keywords = 1.0
