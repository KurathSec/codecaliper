[case]
id = "java-switch-001"
language = "java"
rulings = ["CC-ALL-0001", "CC-JAVA-0006", "COG-ALL-0001", "LOC-ALL-0004"]
computed_by = "hand"
notes = """
Classic colon switch. tree-sitter-java parses a switch STATEMENT as a
`switch_expression` node (body: switch_block with switch_block_statement_groups).
CC = 1 (CC-ALL-0001) + three `case` switch_labels (+1 each, CC-JAVA-0006) = 4;
the `default` switch_label does not count (fall-through path), and the
switch_expression node itself is NodeClass.SWITCH, which is not a cyclomatic
decision class — the branches are counted at the labels, not at the statement.
Cognitive: the switch statement is ONE structural increment (COG-ALL-0001):
+1 + nesting 0 = 1 (class body and top-level method body do not deepen
nesting); the case/default labels contribute nothing. No boolean sequences and
no calls, so the recursion-mode divergence cannot fire: whitepaper =
sonar_compat = 1, file and function alike.
lloc (LOC-ALL-0004) = class_declaration + method_declaration +
switch_expression + 4 return_statement = 7 (switch_label / switch_block are
not in the statement table).
"""

[expect.file]
cyclomatic = 4
lloc = 7

[expect.file.cognitive]
whitepaper = 1
sonar_compat = 1

[expect.functions.describe]
cyclomatic = 4

[expect.functions.describe.cognitive]
whitepaper = 1
sonar_compat = 1
