[case]
id = "java-block-comment-001"
language = "java"
rulings = ["LOC-ALL-0003", "BW-ALL-0003", "TOK-JAVA-0001"]
computed_by = "hand"
notes = """
The block comment spans lines 1-2: comment_lines counts BOTH (coverage,
LOC-ALL-0003) plus the line comment on line 4 -> 3. Code lines: 3, 5, 6 ->
sloc 3. CC = 1; cognitive = 0. lloc = class + method + return = 3.
BW counts comment TOKENS once each (BW-ALL-0003, provisional): 2 tokens / 6
lines -> avg_comments = 1/3.
"""

[expect.file]
cyclomatic = 1
physical_lines = 6
blank_lines = 0
sloc = 3
comment_lines = 3
lloc = 3

[expect.file.cognitive]
whitepaper = 0
sonar_compat = 0

[expect.bw]
avg_comments = 0.3333333333333333
avg_numbers = 0.16666666666666666
