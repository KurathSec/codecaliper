[case]
id = "java-elseif-001"
language = "java"
rulings = ["CC-ALL-0001", "CC-JAVA-0001", "COG-ALL-0001", "COG-ALL-0002", "LOC-ALL-0004", "BW-JAVA-0002"]
computed_by = "hand"
notes = """
Java has no else_clause node: the else-if is the if_statement in the outer if's
`alternative` field (classified ELIF_CONTINUATION, chain-flattened), and the
final anonymous `else` token before a block is the else arm.
CC = 1 + if + else-if = 3. Cognitive = if(+1) + else-if(+1 flat) + else(+1
flat) = 3, both modes; the outer `else` that introduces the else-if is NOT also
counted (no double count, COG-ALL-0002).
All 11 lines have code tokens -> sloc 11.
lloc = class + method + 2 if_statements + 3 returns = 7.
BW: branch keywords: two `if` tokens -> 2/11; comparisons > *2 -> 2/11.
"""

[expect.file]
cyclomatic = 3
physical_lines = 11
sloc = 11
comment_lines = 0
lloc = 7

[expect.file.cognitive]
whitepaper = 3
sonar_compat = 3

[expect.functions.grade]
