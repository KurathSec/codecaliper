[case]
id = "go-switch-001"
language = "go"
rulings = ["CC-ALL-0001", "CC-GO-0004", "COG-ALL-0001", "LOC-ALL-0004"]
computed_by = "hand"
notes = """
An expression switch with three arms: `case 1`, `case 2, 3` and `default`.
`case 2, 3` is a single `expression_case` node (two values, one arm).
CC = 1 (CC-ALL-0001) + expression_case(1) + expression_case(1) = 3 (CC-GO-0004;
the `default_case` is the fall-through path and does not count, and the switch
statement node itself is not a decision point).
Cognitive = the switch is one structural increment (COG-ALL-0001): +1 + nesting
0 = 1; the case/default arms contribute nothing. whitepaper = sonar_compat = 1.
lloc (LOC-ALL-0004) = package_clause + function_declaration +
expression_switch_statement + 3 return_statement = 6 (the case clauses are not
in the statement table).
"""

[expect.file]
cyclomatic = 3
lloc = 6

[expect.file.cognitive]
whitepaper = 1
sonar_compat = 1

[expect.functions.name]
cyclomatic = 3

[expect.functions.name.cognitive]
whitepaper = 1
sonar_compat = 1
